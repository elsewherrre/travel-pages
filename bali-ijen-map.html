<html lang="zh-CN">
<head>

<style>
:root {
  --bg: #0b0b0b;
  --card: #131313;
  --card-hover: #1a1a1a;
  --text: #e0e0e0;
  --muted: #888;
  --green: #5d8a5e;
  --green-glow: #7ab07c;
  --gold: #c9a96e;
  --border: #262626;
  --tag-bg: #141d14;
  --booking: #003b95;
  --sidebar-w: 340px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
  height: 100vh; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════ LAYOUT ═══════════ */
#app { display: flex; height: 100vh; }
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 10;
}
#map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* ═══════════ SIDEBAR HEADER ═══════════ */
.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-header .badge {
  display: inline-block; padding: 3px 12px; border-radius: 12px;
  background: rgba(93,138,94,0.15); color: var(--green-glow);
  font-size: 12px; letter-spacing: 0.5px; margin-bottom: 8px;
}
.sidebar-header h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.sidebar-header .sub { font-size: 12px; color: var(--muted); }

/* ═══════════ TIMELINE ═══════════ */
.timeline-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 24px;
  scroll-behavior: smooth;
}
.timeline-wrap::-webkit-scrollbar { width: 3px; }
.timeline-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.timeline {
  position: relative;
  display: flex; flex-direction: column;
  padding: 4px 0;
}
.timeline::before {
  content: ''; position: absolute;
  left: 20px; top: 0; bottom: 0; width: 1px;
  background: var(--border); z-index: 0;
}

.tl-node {
  position: relative; z-index: 1;
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 20px 14px 8px;
  cursor: pointer;
  transition: background 0.2s;
  border-left: 3px solid transparent;
}
.tl-node:hover { background: var(--card-hover); }
.tl-node.active {
  background: rgba(93,138,94,0.06);
  border-left-color: var(--green);
}

.tl-dot {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--card);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  transition: all 0.3s;
  position: relative;
}
.tl-node.active .tl-dot {
  border-color: var(--green);
  box-shadow: 0 0 10px rgba(93,138,94,0.2);
}
.tl-dot .tl-num {
  position: absolute; top: -6px; right: -6px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--border); color: var(--muted);
  font-size: 9px; display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.tl-node.active .tl-dot .tl-num {
  background: var(--green); color: #fff;
}

.tl-info { flex: 1; min-width: 0; }
.tl-info .tl-date {
  font-size: 12px; color: var(--green-glow); font-weight: 600;
  letter-spacing: 0.5px; margin-bottom: 2px;
}
.tl-info .tl-label {
  font-size: 15px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tl-info .tl-spots {
  font-size: 11px; color: var(--muted); margin-top: 3px;
  line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ═══════════ MAP OVERLAYS ═══════════ */
.map-overlay-top {
  position: absolute; top: 16px; left: 50%;
  transform: translateX(-50%); z-index: 5;
  display: flex; gap: 0;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.mode-btn {
  padding: 10px 18px; font-size: 13px; font-weight: 600;
  background: transparent; border: none; color: var(--muted);
  cursor: pointer; transition: all 0.2s;
  border-right: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.mode-btn:last-child { border-right: none; }
.mode-btn:hover { color: #fff; background: var(--card-hover); }
.mode-btn.active { color: var(--green-glow); background: rgba(93,138,94,0.1); }

.day-info-bar {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 5;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px;
  max-width: 420px; width: calc(100% - 32px);
  pointer-events: none;
}
.day-info-bar h3 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.day-info-bar .spots-list {
  font-size: 11px; color: var(--muted); line-height: 1.5;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.day-info-bar .spot-tag {
  background: var(--card); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 4px; font-size: 10px;
  color: var(--text);
}

/* ═══════════ LEGEND ═══════════ */
.legend {
  position: absolute; bottom: 24px; right: 16px; z-index: 5;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
.legend-line { width: 24px; height: 3px; border-radius: 2px; }
.legend-dash { width: 24px; height: 2px; border-radius: 1px; }

/* ═══════════ SIDEBAR FOOTER ═══════════ */
.sidebar-footer {
  padding: 14px 20px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--muted);
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.sidebar-footer a {
  color: var(--green-glow); text-decoration: none;
  font-weight: 600;
}

/* ═══════════ MOBILE ═══════════ */
@media (max-width: 768px) {
  #app { flex-direction: column; }
  #sidebar {
    width: 100%; height: auto; flex-shrink: 0;
    border-right: none; border-bottom: 1px solid var(--border);
    flex-direction: column; max-height: 42vh;
  }
  .sidebar-header { padding: 16px 16px 8px; }
  .sidebar-header h2 { font-size: 16px; }
  .timeline-wrap {
    flex: 1; overflow-x: auto; overflow-y: hidden;
    padding: 0 0 8px;
    -webkit-overflow-scrolling: touch;
  }
  .timeline {
    flex-direction: row; gap: 0; min-width: max-content;
    padding: 8px 12px;
  }
  .timeline::before {
    left: 12px; right: 12px; top: 20px; height: 1px; width: auto;
  }
  .tl-node {
    flex-direction: column; align-items: center;
    padding: 8px 10px; border-left: none; border-top: 3px solid transparent;
    min-width: 62px; gap: 8px;
  }
  .tl-node.active { border-top-color: var(--green); border-left-color: transparent; }
  .tl-info { text-align: center; }
  .tl-info .tl-label { font-size: 12px; }
  .tl-info .tl-date { font-size: 10px; }
  .tl-info .tl-spots { display: none; }
  .tl-dot { width: 34px; height: 34px; font-size: 14px; }
  #map-wrap { flex: 1; }
  .day-info-bar { bottom: 12px; padding: 10px 14px; }
  .day-info-bar h3 { font-size: 12px; }
  .legend { bottom: 12px; right: 8px; padding: 8px 10px; }
  .mode-btn { padding: 8px 14px; font-size: 12px; }
  .sidebar-footer { padding: 8px 12px; font-size: 10px; }
}
</style>

// ═══════════ INIT MAP ═══════════
const map = new TMap.Map('map', {
  center: new TMap.LatLng(-8.50, 115.20),
  zoom: 9,
  mapStyleId: 'style8',
  minZoom: 4, maxZoom: 17,
  showControl: false,
});
// Remove default controls for clean look
setTimeout(() => {
  const controls = document.querySelectorAll('.tmap-zoom-control, .tmap-copyright, .tmap-logo');
  controls.forEach(el => el.style.display = 'none');
}, 500);

let currentDay = null;
let currentMode = 'combined';
let markerLayer = null;
let polylineLayer = null;
let infoWindow = null;

// ═══════════ BUILD TIMELINE ═══════════
const tl = document.getElementById('timeline');
const tlWrap = document.getElementById('timeline-wrap');
DAYS.forEach((day, idx) => {
  const node = document.createElement('div');
  node.className = 'tl-node';
  node.dataset.dayId = day.id;
  node.innerHTML = `
    <div class="tl-dot">
      ${day.icon}
      <div class="tl-num">${idx+1}</div>
    </div>
    <div class="tl-info">
      <div class="tl-date">${day.date} · ${day.dow}</div>
      <div class="tl-label">${day.label}</div>
      <div class="tl-spots">${day.spots}</div>
    </div>
  `;
  node.addEventListener('click', () => selectDay(day.id));
  tl.appendChild(node);
});

// ═══════════ MODE TOGGLE ═══════════
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    if (currentDay) renderDay(currentDay);
  });
});

// ═══════════ SELECT DAY ═══════════
function selectDay(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  if (!day) return;
  currentDay = day;

  // Update timeline UI
  document.querySelectorAll('.tl-node').forEach(n => {
    n.classList.toggle('active', n.dataset.dayId === dayId);
  });

  // Scroll to active node
  const activeNode = document.querySelector(`.tl-node[data-day-id="${dayId}"]`);
  if (activeNode) {
    if (window.innerWidth <= 768) {
      activeNode.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    } else {
      activeNode.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  // Update info bar
  document.getElementById('day-info-title').textContent = `${day.date} ${day.dow} · ${day.label}`;
  const spotsEl = document.getElementById('day-info-spots');
  spotsEl.innerHTML = day.points.map((p, i) =>
    `<span class="spot-tag">${i===0?'⭑':''} ${p.name}</span>`
  ).join('');

  // Render on map
  renderDay(day);
}

// ═══════════ RENDER DAY ═══════════
function renderDay(day) {
  // Clear old layers
  if (markerLayer) { markerLayer.setMap(null); markerLayer = null; }
  if (polylineLayer) { polylineLayer.setMap(null); polylineLayer = null; }
  if (infoWindow) { infoWindow.close(); infoWindow = null; }

  // Animate map
  map.panTo(new TMap.LatLng(day.center[0], day.center[1]), { duration: 600 });
  setTimeout(() => map.setZoom(day.zoom), 300);

  // Build marker geometries
  const markerStyles = {
    'start': new TMap.MarkerStyle({
      width: 1, height: 1, anchor: { x: 0.5, y: 0.5 }, src: DOT,
      color: '#fff', size: 13, fontWeight: '700',
      backgroundColor: '#5d8a5e', backgroundBorderRadius: 14,
      backgroundWidth: 28, backgroundHeight: 28,
      direction: 'center',
    }),
    'poi': new TMap.MarkerStyle({
      width: 1, height: 1, anchor: { x: 0.5, y: 0.5 }, src: DOT,
      color: '#e0e0e0', size: 11, fontWeight: '600',
      backgroundColor: '#1a1a1a', backgroundBorderRadius: 13,
      backgroundWidth: 26, backgroundHeight: 26,
      borderColor: '#5d8a5e', borderWidth: 1.5,
      direction: 'center',
    }),
    'end': new TMap.MarkerStyle({
      width: 1, height: 1, anchor: { x: 0.5, y: 0.5 }, src: DOT,
      color: '#fff', size: 13, fontWeight: '700',
      backgroundColor: '#c9a96e', backgroundBorderRadius: 14,
      backgroundWidth: 28, backgroundHeight: 28,
      direction: 'center',
    }),
  };

  const markerGeoms = day.points.map((p, i) => ({
    id: `m${i}`,
    styleId: p.type,
    position: new TMap.LatLng(p.lat, p.lng),
    content: String(p.n),
    properties: { name: p.name, num: p.n },
  }));

  markerLayer = new TMap.MultiMarker({
    map, styles: markerStyles, geometries: markerGeoms,
  });

  // Markers click → info window
  markerLayer.on('click', (e) => {
    if (infoWindow) infoWindow.close();
    const pos = e.geometry.position;
    const name = e.geometry.properties.name;
    const num = e.geometry.properties.num;
    infoWindow = new TMap.InfoWindow({
      map,
      position: pos,
      offset: { x: 0, y: -20 },
      content: `<div style="background:#131313;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #262626;white-space:nowrap;">${num}. ${name}</div>`,
    });
    infoWindow.open();
  });

  // Build polyline geometries
  const isWalking = (segIdx) => {
    const seg = day.segments[segIdx];
    if (!seg) return false;
    return seg[2]; // seg[2] = isWalking boolean
  };

  if (day.segments && day.segments.length > 0) {
    const polyGeoms = [];

    if (currentMode === 'combined') {
      // Combined: split into driving vs walking segments
      const walkPaths = [];
      const drivePaths = [];

      day.segments.forEach(seg => {
        const p1 = day.points[seg[0]];
        const p2 = day.points[seg[1]];
        if (seg[2]) {
          walkPaths.push([new TMap.LatLng(p1.lat, p1.lng), new TMap.LatLng(p2.lat, p2.lng)]);
        } else {
          drivePaths.push([new TMap.LatLng(p1.lat, p1.lng), new TMap.LatLng(p2.lat, p2.lng)]);
        }
      });

      if (drivePaths.length > 0) {
        polyGeoms.push({ id: 'drive', styleId: 'drive', paths: drivePaths });
      }
      if (walkPaths.length > 0) {
        polyGeoms.push({ id: 'walk', styleId: 'walk', paths: walkPaths });
      }
    } else if (currentMode === 'walking') {
      // Walking mode: all segments as walking style
      const allPaths = day.segments.map(seg => {
        const p1 = day.points[seg[0]];
        const p2 = day.points[seg[1]];
        return [new TMap.LatLng(p1.lat, p1.lng), new TMap.LatLng(p2.lat, p2.lng)];
      });
      polyGeoms.push({ id: 'all', styleId: 'walk', paths: allPaths });
    } else {
      // Driving mode: all segments as driving style
      const allPaths = day.segments.map(seg => {
        const p1 = day.points[seg[0]];
        const p2 = day.points[seg[1]];
        return [new TMap.LatLng(p1.lat, p1.lng), new TMap.LatLng(p2.lat, p2.lng)];
      });
      polyGeoms.push({ id: 'all', styleId: 'drive', paths: allPaths });
    }

    const polyStyles = {
      'drive': new TMap.PolylineStyle({
        color: '#4d9fff', width: 5, borderWidth: 0,
        lineCap: 'round', showArrow: true,
        arrowOptions: { width: 6, height: 5, space: 60, animSpeed: 30 },
      }),
      'walk': new TMap.PolylineStyle({
        color: '#7ab07c', width: 3, borderWidth: 0,
        lineCap: 'round', dashArray: [10, 6],
      }),
    };

    polylineLayer = new TMap.MultiPolyline({
      map, styles: polyStyles, geometries: polyGeoms,
    });
  }
}

// ═══════════ INIT ═══════════
// Default select first day
setTimeout(() => selectDay('d1'), 800);
</script>
